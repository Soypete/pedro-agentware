name: toolcall_basic
description: Basic tool call evaluation suite
version: "0.1.0"
agent_type: coding

tasks:
  - id: file_search_basic
    description: Test basic file search capability
    agent_type: coding
    input:
      prompt: "List all Go files in the middleware directory"
      context:
        root_dir: "../../middleware"
    graders:
      - type: tool_calls
        required: true
        config:
          expected_tools:
            - Glob
          min_calls: 1

  - id: file_search_pattern
    description: Test pattern-based file search
    agent_type: coding
    input:
      prompt: "Find all test files in the project"
    graders:
      - type: tool_calls
        required: true
        config:
          expected_tools:
            - Glob
          min_calls: 1

  - id: read_file
    description: Test file read capability
    agent_type: coding
    input:
      prompt: "Read the middleware.go file and tell me what it does"
      context:
        file_path: "../../middleware/middleware.go"
    graders:
      - type: tool_calls
        required: true
        config:
          expected_tools:
            - Read
          min_calls: 1

  - id: grep_content
    description: Test content search
    agent_type: coding
    input:
      prompt: "Find all occurrences of 'ToolExecutor' in the codebase"
    graders:
      - type: tool_calls
        required: true
        config:
          expected_tools:
            - Grep
          min_calls: 1