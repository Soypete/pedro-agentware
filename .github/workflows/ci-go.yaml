name: Go CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.changed_files, 'middleware/') ||
         contains(github.event.pull_request.changed_files, 'go.mod') ||
         contains(github.event.pull_request.changed_files, 'go.sum')))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Restore Go cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: nonexistent
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-

      - name: Download Go modules
        run: cd middleware && go mod download

      - name: Run tests
        run: cd middleware && go test -v ./...

      - name: Run coverage
        run: cd middleware && go test -coverprofile=coverage.out ./...

      - name: Check coverage
        run: |
          cd middleware
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $NF}' | cut -d'%' -f1)
          if (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "Coverage $COVERAGE% is below 90%"
            exit 1
          fi
          echo "Coverage: $COVERAGE%"

      - name: Build
        run: cd middleware && go build ./...

      - name: golangci-lint
        env:
          CGO_ENABLED: 1
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          skip-cache: true
          working-directory: ./middleware

      - name: Vet
        run: cd middleware && go vet ./...