name: Weekly Release

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight
  workflow_dispatch:

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        name: Bump versions
        run: |
          # Get current date for version
          DATE=$(date +%Y%m%d)
          
          # Bump Go version
          cd go
          go mod tidy
          GO_VERSION=$(go list -m -json | jq -r '.Version')
          if [ "$GO_VERSION" == "v0.0.0" ]; then
            GO_VERSION="v0.1.0"
          else
            GO_VERSION="v0.1.$DATE"
          fi
          cd ..
          
          # Bump Python version in pyproject.toml
          cd python
          PYTHON_VERSION=$(grep '^version = ' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          PYTHON_VERSION="0.1.$DATE"
          sed -i "s/^version = .*/version = \"$PYTHON_VERSION\"/" pyproject.toml
          cd ..
          
          # Bump TypeScript version in package.json
          cd typescript
          TS_VERSION="0.1.$DATE"
          sed -i "s/\"version\": \".*\"/\"version\": \"$TS_VERSION\"/" package.json
          cd ..
          
          echo "new_version=$DATE" >> $GITHUB_OUTPUT
          echo "Versions bumped to 0.1.$DATE"

      - name: Commit version bumps
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add go/go.mod go/go.sum python/pyproject.toml typescript/package.json
          git commit -m "chore: bump versions to ${{ steps.version.outputs.new_version }}"
          git push

  publish-go:
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Publish to GitHub Packages
        run: |
          cd go
          go mod tidy
          go build ./...
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build and publish
        run: |
          cd python
          pip install build twine
          python -m build
          python -m twine upload --skip-upload --repository pypi dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-npm:
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Build and publish
        run: |
          cd typescript
          npm ci
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}