name: Go Test

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - '.github/workflows/go-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'go/**'
      - '.github/workflows/go-test.yml'

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run Go lint
        run: |
          cd go
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run
      - name: Run Go tests
        run: |
          cd go
          go mod download
          go test ./...